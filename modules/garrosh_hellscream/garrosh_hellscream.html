<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Garrosh Hellscream VU Meter</title>
	<link rel="stylesheet" href="garrosh_hellscream.css" />
</head>
<body>
<div class="garrosh-hellscream-vu-meter" role="group" aria-label="VU meter">
	<div class="garrosh-hellscream-needle" aria-hidden="true"></div>
</div>

<div id="status" style="
    position: fixed; bottom: 14px; left: 14px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #ddd; opacity: 0.9; background: rgba(0,0,0,0.35);
    padding: 8px 10px; border-radius: 6px; border: 1px solid #333;">
	MIDI: <span id="midi-state">initialising…</span> — Last velocity: <span id="vel">0</span>
	<span style="opacity:.7">| press <b>V</b> to simulate</span>
</div>

<script src="garrosh_hellscream.js" defer></script>

</body>
</html>
