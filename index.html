<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tonika – VPC1 Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/piano.js"></script>
    <script defer src="js/guitar.js"></script>
    <script defer src="js/recorder.js"></script>
    <script defer src="js/takes.js"></script>
    <script defer src="js/theory-analysis.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <div class="wrap">
      <!-- Top bar: only controls now -->
      <div class="bar">
        <div class="title">Tonika</div>

        <label
          >MIDI In:
          <select id="midiIn"></select>
        </label>

        <label
          >Key:
          <select id="keySel"></select>
        </label>

        <label
          >Scale:
          <select id="scaleSel"></select>
        </label>

        <label
          >Tuning:
          <select id="tuningSel">
            <option value="40,45,50,55,59,64">Guitar EADGBE (std)</option>
            <option value="38,45,50,55,59,64">Drop D</option>
            <option value="43,48,53,58,62,67">FADGCF</option>
          </select>
        </label>

        <label
          >View:
          <select id="viewSel">
            <option value="both">Both</option>
            <option value="piano">Piano only</option>
            <option value="fret">Fretboard only</option>
          </select>
        </label>
        <!-- inside .bar (top controls), after the View selector -->
        <button id="settingsBtn" class="btn small">⚙︎ Settings</button>
      </div>

      <div class="grid" id="mainGrid">
        <!-- Piano card -->
        <div class="card" id="pianoCard">
          <div class="stat">
            <!-- left side: label + active notes -->
            <div class="stat-left">
              <div>
                <span id="smallPrefix"></span>
                <span id="chordName" class="title"></span>
              </div>
              <div class="small">
                Active notes: <span id="activeNotes">[]</span>
              </div>
            </div>

            <!-- right side: recorder + latency -->
            <div class="stat-right">
              <span id="recStatus" class="small idle">● idle</span>
              <button id="saveTakes" class="btn small">Save takes</button>
              <span id="latencyText" class="small"></span>
            </div>
          </div>

          <canvas id="piano" width="1320" height="160"></canvas>

          <div class="legend small">
            <span
              ><span class="dot" style="background: #6aa0ff"></span
              >Pressed</span
            >
            <span
              ><span class="dot" style="background: #58d68d"></span>In
              scale</span
            >
            <span
              ><span class="dot" style="background: #f5b041"></span>Root</span
            >
          </div>

          <div class="big-chord">
            <span id="bigPrefix" class="label"></span>
            <span id="bigChordName" class="name"></span>
          </div>

          <!-- Theory Analysis Display -->
          <div id="theory-analysis" class="theory-analysis hidden">
            <div class="theory-item">
              <span class="theory-label">Roman</span>
              <span
                class="theory-value roman"
                id="roman-numeral"
                title="Roman numeral analysis shows the chord's relationship to the key center"
                >-</span
              >
            </div>
            <div class="theory-item">
              <span class="theory-label">Function</span>
              <span
                class="theory-value function"
                id="chord-function"
                title="Harmonic function describes the chord's role in the progression"
                >-</span
              >
            </div>
            <div class="theory-item">
              <span class="theory-label">Tensions</span>
              <span
                class="theory-value tensions"
                id="available-tensions"
                title="Available tensions are extensions that can be added to the chord"
                >-</span
              >
            </div>
            <div class="theory-item">
              <span class="theory-label">Progression</span>
              <span
                class="theory-value progression"
                id="progression-pattern"
                title="Common chord progression patterns"
                >-</span
              >
            </div>

            <!-- Theory Description Area -->
            <div id="theory-description" class="theory-description hidden">
              <div id="function-description" class="description-text"></div>
            </div>
          </div>
        </div>

        <!-- Fretboard card -->
        <div class="card" id="fretCard">
          <div class="stat">
            <div>Fretboard</div>
            <div class="small">24 frets</div>
          </div>
          <canvas id="fretboard" width="1100" height="280"></canvas>
        </div>
      </div>

      <div class="card small">
        Tips: Select the <b>IAC Driver</b> as MIDI input. Your VPC1 plays SINE
        in MainStage; the same notes appear here.
      </div>

      <footer>
        © you • This is a local prototype. Web MIDI works best in Chrome.
      </footer>

      <!-- Settings Dialog -->
      <dialog id="settingsDialog">
        <form method="dialog" class="settings-form">
          <h3>Settings</h3>

          <label class="row">
            <span>Big chord size</span>
            <input
              id="bigChordScale"
              type="range"
              min="0.6"
              max="1.6"
              step="0.05"
              value="1"
            />
            <span id="bigChordScaleVal" class="value">100%</span>
          </label>

          <label class="settings-toggle">
            <input id="showTheoryExplanations" type="checkbox" />
            <span>Show theory explanations</span>
          </label>

          <div class="buttons">
            <button value="cancel" class="btn small">Close</button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
