<!doctype html>
<html lang="en" data-tone="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tonika — Modular App (Dev)</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body {
        margin: 16px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 auto 12px;
        max-width: 1200px;
      }
      .tag {
        font:
          12px/1 ui-monospace,
          Menlo,
          Consolas;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #333;
        opacity: 0.8;
      }
      .panel {
        border: 1px solid #2a2f3b;
        border-radius: 10px;
        padding: 10px;
        background: #0b0c0f;
        min-height: 220px;
        max-width: 1200px;
        margin: 12px auto;
      }
      .panel h2 {
        margin: 0 0 8px;
        font:
          14px/1.2 ui-sans-serif,
          system-ui;
        opacity: 0.9;
      }
      #piano-wrap {
        display: flex;
        flex-direction: column;
        overflow-x: auto;
      }
      #piano-canvas {
        width: 100%;
        height: 240px;
        display: block;
      }
      #piano-controls button,
      #piano-controls input[type="range"] {
        padding: 4px 8px;
      }
      #piano-controls label {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin: 0">Tonika (Modular)</h1>
      <span class="tag">Stage 3.4: Solo piano</span>
    </header>

    <!-- Support mounts above this line -->

    <div class="panel" id="piano-wrap">
      <h2>Piano</h2>
      <!-- controls + canvas mount here -->
      <canvas id="piano-canvas"></canvas>
    </div>

    <!-- Legacy piano renderer -->
    <script defer src="js/piano.js"></script>
    <!-- Modular app -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
