<div class="my-synth" 
     data-tonika-config='{
       "buttons": ".synth-button",
       "rotaries": ".synth-knob",
       "touchbars": ".synth-slider"
     }'>
  
  <!-- Header -->
  <div class="synth-header">
    <h2>My Test Synth</h2>
  </div>
  
  <!-- Button Section -->
  <div class="button-section">
    <div class="synth-button">Play</div>
    <div class="synth-button">Stop</div>
    <div class="synth-button">Record</div>
    <div class="synth-button">Loop</div>
  </div>
  
  <!-- Knob Section -->
  <div class="knob-section">
    <div class="synth-knob">
      <div class="knob-label">Volume</div>
    </div>
    <div class="synth-knob">
      <div class="knob-label">Filter</div>
    </div>
    <div class="synth-knob">
      <div class="knob-label">Resonance</div>
    </div>
    <div class="synth-knob">
      <div class="knob-label">Attack</div>
    </div>
  </div>
  
  <!-- Slider Section -->
  <div class="slider-section">
    <div class="synth-slider">
      <div class="slider-label">Master Volume</div>
    </div>
    <div class="synth-slider">
      <div class="slider-label">Pitch Bend</div>
    </div>
  </div>
  
</div>
