<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Retro Sci-Fi Synth (Tone.js)</title>
	<script src="https://unpkg.com/tone@14.8.39/build/Tone.js"></script>
</head>
<body>
<h1>Retro Sci-Fi Synth (Tone.js)</h1>

<button id="startAudio">Start Audio</button>
<button id="stopAudio">Stop Audio</button>
<br><br>

<button id="toggleBass">Toggle Bass</button>
<button id="toggleLead">Toggle Lead</button>
<button id="toggleArp">Toggle Arp</button>
<button id="playFX">Play FX</button>

<script>
	// --- Synths ---
	const bass = new Tone.Synth({
		oscillator: { type: "sine" },
		envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.3 }
	}).toDestination();

	const lead = new Tone.MonoSynth({
		oscillator: { type: "square" },
		portamento: 0.1,
		envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 0.8 }
	}).toDestination();

	const arp = new Tone.Synth({
		oscillator: { type: "sawtooth" },
		envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.2 }
	}).toDestination();

	const noise = new Tone.Noise("white").start();
	const noiseFilter = new Tone.Filter(800, "bandpass").toDestination();
	const noiseEnv = new Tone.AmplitudeEnvelope({
		attack: 0.2, decay: 1, sustain: 0, release: 1
	}).connect(noiseFilter);
	noise.connect(noiseEnv);

	// --- Effects ---
	const reverb = new Tone.Reverb({ decay: 3, wet: 0.3 }).toDestination();
	const delay = new Tone.FeedbackDelay("8n", 0.3).toDestination();

	lead.connect(reverb);
	lead.connect(delay);
	arp.connect(reverb);
	arp.connect(delay);

	// --- Sequences ---
	const bassSeq = new Tone.Sequence((time, note) => {
		bass.triggerAttackRelease(note, "8n", time);
	}, ["C2", "C2", "C2", "C2"], "4n");

	const leadSeq = new Tone.Sequence((time, note) => {
		lead.triggerAttackRelease(note, "8n", time);
	}, ["E4", "G4", "A4", "G4", "E4", "C4"], "4n");

	const arpSeq = new Tone.Sequence((time, note) => {
		arp.triggerAttackRelease(note, "16n", time);
	}, ["C3", "E3", "G3", "B3", "C4", "B3", "G3", "E3"], "16n");

	// --- Controls ---
	let bassOn = false, leadOn = false, arpOn = false;

	document.getElementById("startAudio").onclick = async () => {
		await Tone.start();
		Tone.Transport.start();
		console.log("Audio Started");
	};

	document.getElementById("stopAudio").onclick = () => {
		Tone.Transport.stop();
		bassSeq.stop();
		leadSeq.stop();
		arpSeq.stop();
		console.log("Audio Stopped");
	};

	document.getElementById("toggleBass").onclick = () => {
		bassOn = !bassOn;
		bassOn ? bassSeq.start(0) : bassSeq.stop();
	};

	document.getElementById("toggleLead").onclick = () => {
		leadOn = !leadOn;
		leadOn ? leadSeq.start(0) : leadSeq.stop();
	};

	document.getElementById("toggleArp").onclick = () => {
		arpOn = !arpOn;
		arpOn ? arpSeq.start(0) : arpSeq.stop();
	};

	document.getElementById("playFX").onclick = () => {
		noiseEnv.triggerAttackRelease("2n");
	};

	// Transport tempo
	Tone.Transport.bpm.value = 100;
</script>
</body>
</html>
