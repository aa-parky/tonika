<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Synthonika – Dev Shell</title>

	<!-- Core Tonika styles -->
	<link href="../css/tonika-theme-base.css" rel="stylesheet" />
	<link href="../css/tonika-layout.css" rel="stylesheet" />
	<link href="../css/tonika-components.css" rel="stylesheet" />
	<link href="../css/tonika-tokens.css" rel="stylesheet" />
	<link href="../css/tonika-accessibility.css" rel="stylesheet" />

	<!-- Synthonika styles -->
	<link href="../css/streamonika.css" rel="stylesheet" />

	<!-- Dev-shell overrides (scoped) -->
	<style>
		body {
			background: #222;
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		/* Narrower container for hardware UI dev */
		.tonika-container {
			width: auto;
			max-width: 640px;
			margin: 2rem auto;
		}
		/* Override curated app's fixed width rules for dev */
		.tonika-container .tabs { width: 100%; }
		.tonika-container .tab-content {
			width: 100%;
			height: auto;
			min-height: 420px;
			margin: 0;
			padding: var(--spacing-lg);
			box-sizing: border-box;
		}

		/* Demo legibility */
		.synthonika > div {
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 10px;
			color: #333;
		}

		/* Dev header styling */
		.dev-header {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 8px;
			padding: 8px;
			background: var(--color-bg-secondary, #333);
			color: var(--color-text-primary, #fff);
			border-bottom: 1px solid var(--color-border, #555);
		}
		.dev-header select,
		.dev-header input[type="color"],
		.dev-header button {
			margin: 0;
		}
		.tonika-control-inline {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			cursor: pointer;
		}
		.tonika-control-inline .tonika-label {
			margin: 0;
		}

	</style>
</head>
<body>

<!-- Dev Header -->
<div class="dev-header">
	<!-- Texture controls -->
	<select id="textureSelect">
		<option value="">Default</option>
		<option value="../developers/beige-paper.png">Beige Paper</option>
		<option value="../developers/dotnoise-light-grey.png">Dot Noise</option>
		<option value="../developers/noise.webp">Noise</option>
	</select>

	<input type="color" id="bgColorPicker" value="#2c2c2c" />

	<select id="textureMode">
		<option value="tile">Tile</option>
		<option value="stretch">Stretch</option>
	</select>

	<select id="textureScale">
		<option value="100">100px</option>
		<option value="200" selected>200px</option>
		<option value="400">400px</option>
	</select>

	<button id="debugToggle">Toggle Debug</button>
	<button id="resetStyles">Reset Styles</button>

	<!-- Theme / Accessibility controls -->
	<select id="theme-selector" class="tonika-select" style="max-width:180px"></select>
	<button class="tonika-btn" data-action="toggle-theme">Toggle Light/Dark</button>
	<label for="high-contrast-toggle" class="tonika-control-inline">
		<input type="checkbox" id="high-contrast-toggle" class="tonika-checkbox" />
		<span class="tonika-label">High Contrast</span>
	</label>
</div>

<!-- Tonika-style tab shell -->
<div class="tonika-container">
	<div class="tabs">
		<button class="active">Synthonika</button>
		<button disabled>Other (stub)</button>
	</div>

	<div class="tab-content">
		<section class="active">
			<div class="tonika-module">
				<div class="synthonika">
					<!-- Buttons Row 1 -->
					<div class="synthonika__button synthonika__button--1">B1</div>
					<div class="synthonika__button synthonika__button--2">B2</div>
					<div class="synthonika__button synthonika__button--3">B3</div>
					<div class="synthonika__button synthonika__button--4">B4</div>

					<!-- Buttons Row 2 -->
					<div class="synthonika__button synthonika__button--5">B5</div>
					<div class="synthonika__button synthonika__button--6">B6</div>
					<div class="synthonika__button synthonika__button--7">B7</div>
					<div class="synthonika__button synthonika__button--8">B8</div>

					<!-- Touch Bar -->
					<div class="synthonika__touchbar">Touch Bar</div>

					<!-- Rotary Encoders -->
					<div class="synthonika__rotary synthonika__rotary--1">R1</div>
					<div class="synthonika__rotary synthonika__rotary--2">R2</div>
					<div class="synthonika__rotary synthonika__rotary--3">R3</div>
					<div class="synthonika__rotary synthonika__rotary--4">R4</div>
				</div>
			</div>
		</section>
	</div>
</div>

<!-- Load helpers -->
<script src="../js/core/tonika-ui.js"></script>
<script src="../js/core/tonika-theme.js"></script>
<script src="../js/core/tonika-utils.js"></script>

<!-- Debug toggle -->
<script>
	const btn = document.getElementById("debugToggle");
	const container = document.querySelector(".synthonika");
	btn.addEventListener("click", () => Tonika.Utils.toggleDebug(container));
</script>

<!-- Background tint/bleed -->
<script>
	const bgColorPicker = document.getElementById("bgColorPicker");
	bgColorPicker.addEventListener("input", (e) => {
		Tonika.Utils.applyBleedTint(container, e.target.value);
	});
</script>

<!-- Reset styles -->
<script>
	const resetBtn = document.getElementById("resetStyles");
	resetBtn.addEventListener("click", () => {
		Tonika.Utils.resetModuleStyles(container, {
			bgColorPicker, textureSelect, textureMode, textureScale
		});
	});
</script>

<!-- Texture selection -->
<script>
	const textureSelect = document.getElementById("textureSelect");
	const textureMode = document.getElementById("textureMode");
	const textureScale = document.getElementById("textureScale");
	const backgroundEl = document.querySelector(".synthonika");

	function applyTexture() {
		const file = textureSelect.value;
		const mode = textureMode.value;
		const scale = textureScale.value;

		if (!file) {
			backgroundEl.style.background = "var(--color-bg)";
			backgroundEl.style.backgroundSize = "auto";
			return;
		}
		if (mode === "tile") {
			backgroundEl.style.background = `url('${file}') repeat`;
			backgroundEl.style.backgroundSize = `${scale}px ${scale}px`;
		} else {
			backgroundEl.style.background = `url('${file}') center/cover no-repeat`;
			backgroundEl.style.backgroundSize = "cover";
		}
	}
	[textureSelect, textureMode, textureScale].forEach(el =>
			el.addEventListener("change", applyTexture)
	);
</script>


</body>
</html>
