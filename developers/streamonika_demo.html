<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Streamonika – Dev Shell</title>

	<!-- Core Tonika styles -->
	<link href="../css/tonika-theme-base.css" rel="stylesheet" />
	<link href="../css/tonika-layout.css" rel="stylesheet" />
	<link href="../css/tonika-components.css" rel="stylesheet" />
	<link href="../css/tonika-tokens.css" rel="stylesheet" />
	<link href="../css/tonika-accessibility.css" rel="stylesheet" />

	<!-- Tonika Synth Development Core Styles -->
	<link href="../css/tonika-synth-development.css" rel="stylesheet" />

	<!-- Synthonika styles (module-specific) -->
	<link href="../css/streamonika.css" rel="stylesheet" />
</head>
<body>

<!-- Unified Dev Header -->
<div class="dev-header" role="toolbar" aria-label="Developer tools">
	<select id="textureSelect" aria-label="Background texture">
		<option value="">Default</option>
		<option value="../assets/textures/beige-paper.png">Beige Paper</option>
		<option value="../assets/textures/dotnoise-light-grey.png">Dot Noise</option>
		<option value="../assets/textures/noise.webp">Noise</option>
	</select>

	<input type="color" id="bgColorPicker" value="#2c2c2c" aria-label="Bleed tint color" />

	<select id="textureMode" aria-label="Texture mode">
		<option value="tile">Tile</option>
		<option value="stretch">Stretch</option>
	</select>

	<select id="textureScale" aria-label="Texture scale">
		<option value="100">100px</option>
		<option value="200" selected>200px</option>
		<option value="400">400px</option>
	</select>

	<button id="debugToggle" type="button">Toggle Debug</button>
	<button id="resetStyles" type="button">Reset Styles</button>

	<select id="theme-selector" class="tonika-select" style="max-width:180px" aria-label="Theme preset"></select>
	<button class="tonika-btn" data-action="toggle-theme" type="button">Light/Dark</button>

	<label for="high-contrast-toggle">
		<input type="checkbox" id="high-contrast-toggle" class="tonika-checkbox" />
		<span class="tonika-label">High Contrast</span>
	</label>

	<label for="layoutSelect">Layout:</label>
	<select id="layoutSelect">
		<option value="1x1">1 x 1 (single full tab)</option>
		<option value="1x2">1 x 2 (split horizontally)</option>
		<option value="2x2">2 x 2 (four quadrants)</option>
	</select>
</div>

<!-- Tonika-style tab shell -->
<div class="tonika-container">
	<div class="tabs">
		<button class="active">Streamonika</button>
		<button disabled>Other (stub)</button>
	</div>

	<div class="tab-content">
		<section class="active">
			<div class="tonika-module">
				<div class="synthonika">
					<div class="synthonika__button synthonika__button--1">B1</div>
					<div class="synthonika__button synthonika__button--2">B2</div>
					<div class="synthonika__button synthonika__button--3">B3</div>
					<div class="synthonika__button synthonika__button--4">B4</div>
					<div class="synthonika__button synthonika__button--5">B5</div>
					<div class="synthonika__button synthonika__button--6">B6</div>
					<div class="synthonika__button synthonika__button--7">B7</div>
					<div class="synthonika__button synthonika__button--8">B8</div>
					<div class="synthonika__touchbar">Touch Bar</div>
					<div class="synthonika__rotary synthonika__rotary--1">R1</div>
					<div class="synthonika__rotary synthonika__rotary--2">R2</div>
					<div class="synthonika__rotary synthonika__rotary--3">R3</div>
					<div class="synthonika__rotary synthonika__rotary--4">R4</div>
				</div>
			</div>
		</section>
	</div>
</div>

<!-- Dev Layout Sandbox -->
<div class="tonika__development-layout-sandbox">
	<div id="layoutPreview"
	     class="tonika__development-tab-preview tonika__development-tab-preview--1x1">
		<!-- cells will be populated by JS -->
	</div>
</div>

<!-- Load helpers -->
<script src="../js/core/tonika-ui.js"></script>
<script src="../js/core/tonika-theme.js"></script>
<script src="../js/core/tonika-utils.js"></script>

<!-- Init block -->
<script>
	(function () {
		const container = document.querySelector(".synthonika");

		// Controls
		const btnDebug = document.getElementById("debugToggle");
		const btnReset = document.getElementById("resetStyles");
		const bgColorPicker = document.getElementById("bgColorPicker");
		const textureSelect = document.getElementById("textureSelect");
		const textureMode = document.getElementById("textureMode");
		const textureScale = document.getElementById("textureScale");

		// Debug toggle
		btnDebug.addEventListener("click", () => Tonika.Utils.toggleDebug(container));

		// Background tint / bleed
		bgColorPicker.addEventListener("input", (e) => {
			Tonika.Utils.applyBleedTint(container, e.target.value);
		});

		// Reset styles
		btnReset.addEventListener("click", () => {
			Tonika.Utils.resetModuleStyles(container, {
				bgColorPicker, textureSelect, textureMode, textureScale
			});
		});

		// Texture selection
		[textureSelect, textureMode, textureScale].forEach(el =>
				el.addEventListener("change", () => {
					Tonika.Utils.applyTexture(
							container,
							textureSelect.value,
							textureMode.value,
							textureScale.value
					);
				})
		);

		// Layout sandbox
		const layoutSelect = document.getElementById("layoutSelect");
		const layoutPreview = document.getElementById("layoutPreview");
		const originalSynthonika = document.querySelector(".synthonika");

		function renderLayout(layout) {
			layoutPreview.className =
					"tonika__development-tab-preview tonika__development-tab-preview--" + layout;
			layoutPreview.innerHTML = ""; // clear old cells

			let cells = 1;
			if (layout === "1x2") cells = 2;
			if (layout === "2x2") cells = 4;

			for (let i = 0; i < cells; i++) {
				const cell = document.createElement("div");
				cell.className = "tonika__development-tab-preview-cell";

				// only clone into first cell for demo
				if (i === 0 && originalSynthonika) {
					const clone = originalSynthonika.cloneNode(true);
					cell.appendChild(clone);
				}
				layoutPreview.appendChild(cell);
			}
		}

		layoutSelect.addEventListener("change", (e) => renderLayout(e.target.value));

		// initial render
		renderLayout(layoutSelect.value);
	})();
</script>

</body>
</html>
