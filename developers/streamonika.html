<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Streamonika Demo</title>
    <link href="../css/streamonika.css" rel="stylesheet" />
    <style>
      /* Tiny toggle button */
      .debug-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        z-index: 9999;
        transition: background 0.2s;
      }
      .debug-toggle:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <!-- Dev Header -->
    <div class="dev-header">
      <select id="textureSelect">
        <option value="">Default</option>
        <option value="../developers/beige-paper.png">Beige Paper</option>
        <option value="../developers/dotnoise-light-grey.png">Dot Noise</option>
      </select>

	    <input type="color" id="bgColorPicker" value="#2c2c2c" />

      <select id="textureMode">
        <option value="tile">Tile</option>
        <option value="stretch">Stretch</option>
      </select>

      <select id="textureScale">
        <option value="100">100px</option>
        <option value="200" selected>200px</option>
        <option value="400">400px</option>
      </select>

      <button id="debugToggle">Toggle Debug</button>
    </div>

    <!-- Streamonika device -->
    <div class="streamonika-container debug-on">
      <div class="scale-wrapper">
        <div class="background-d037dbafc8c7">background7</div>
        <div class="tchbar-d03993af3dea">tchbar</div>
        <div class="btn01-d0396f3d6bbc">btn01</div>
        <div class="btn02-d0396f3d6bbd">btn02</div>
        <div class="btn03-d0396f3d6bbe">btn03</div>
        <div class="btn04-d0396f3d6bbf">btn04</div>
        <div class="btn01-d03849bc3931">btn01</div>
        <div class="btn02-d038b7239d22">btn02</div>
        <div class="btn03-d038cae3b8d4">btn03</div>
        <div class="btn04-d038cae3b8d3">btn04</div>
        <div class="rotbg-d03bd9b07d3e">rotbg</div>
        <div class="rot01-d03ac3eae7c5">rot01</div>
        <div class="rot02-d03ae5e85a3c">rot02</div>
        <div class="rot03-d03aec381285">rot03</div>
        <div class="rot04-d03aeea8cd9b">rot04</div>
      </div>
    </div>
  </body>
  <script>
    // Toggle debug-on class on click
    const btn = document.getElementById("debugToggle");
    const container = document.querySelector(".streamonika-container");

    btn.addEventListener("click", () => {
      container.classList.toggle("debug-on");
    });
  </script>

  <script>
    const textureSelect = document.getElementById("textureSelect");
    const textureMode = document.getElementById("textureMode");
    const textureScale = document.getElementById("textureScale");
    const background = document.querySelector(".background-d037dbafc8c7");

    function applyTexture() {
      const file = textureSelect.value;
      const mode = textureMode.value;
      const scale = textureScale.value;

      if (!file) {
        background.style.background = "var(--color-bg)";
        background.style.backgroundSize = "auto";
        return;
      }

      if (mode === "tile") {
        background.style.background = `url('${file}') repeat`;
        background.style.backgroundSize = `${scale}px ${scale}px`;
      } else {
        background.style.background = `url('${file}') center/cover no-repeat`;
        background.style.backgroundSize = "cover";
      }
    }

    // Hook up events
    [textureSelect, textureMode, textureScale].forEach((el) =>
      el.addEventListener("change", applyTexture),
    );
  </script>

  <script>
	  const bgColorPicker = document.getElementById("bgColorPicker");

	  // Helper: adjust brightness if too dark
	  function adjustTint(color) {
		  // Convert hex to RGB
		  let r = parseInt(color.substr(1, 2), 16);
		  let g = parseInt(color.substr(3, 2), 16);
		  let b = parseInt(color.substr(5, 2), 16);

		  // Calculate brightness (perceived luminance)
		  let brightness = (0.299 * r + 0.587 * g + 0.114 * b);

		  // If too dark, lighten by mixing with white
		  if (brightness < 80) {
			  r = Math.min(255, r + 60);
			  g = Math.min(255, g + 60);
			  b = Math.min(255, b + 60);
		  }

		  return `rgba(${r}, ${g}, ${b}, 0.3)`; // semi-transparent tint
	  }

	  bgColorPicker.addEventListener("input", (e) => {
		  const color = e.target.value;
		  background.style.backgroundColor = color; // always set base color

		  // Calculate tint with auto-adjust
		  const tint = adjustTint(color);

// Apply ambient tint with different weights per element type
		  document.querySelectorAll('[class*="btn"]').forEach(el => {
			  el.style.boxShadow = `
    0 0 6px ${tint} inset,
    0 0 10px ${tint}
  `;
		  });

		  document.querySelectorAll('[class*="rot0"]').forEach(el => {
			  el.style.boxShadow = `
    0 0 10px ${tint} inset,
    0 0 18px ${tint}
  `;
		  });

		  document.querySelectorAll('[class*="tchbar"]').forEach(el => {
			  el.style.boxShadow = `
    0 0 3px ${tint} inset,
    0 0 6px ${tint}
  `;
		  });

		  document.querySelectorAll('[class*="rotbg"]').forEach(el => {
			  el.style.boxShadow = `
    0 0 4px ${tint} inset,
    0 0 8px ${tint}
  `;
		  });
		  // Reapply texture if one is selected
		  const file = textureSelect.value;
		  const mode = textureMode.value;
		  const scale = textureScale.value;

		  if (file) {
			  if (mode === "tile") {
				  background.style.backgroundImage = `url('${file}')`;
				  background.style.backgroundRepeat = "repeat";
				  background.style.backgroundSize = `${scale}px ${scale}px`;
			  } else {
				  background.style.backgroundImage = `url('${file}')`;
				  background.style.backgroundRepeat = "no-repeat";
				  background.style.backgroundSize = "cover";
				  background.style.backgroundPosition = "center";
			  }
		  } else {
			  background.style.backgroundImage = "none"; // just solid color
		  }
	  });
  </script>

</html>
