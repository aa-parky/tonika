<!doctype html>
<html lang="en" data-theme="brown-01" data-mode="dark">
<head>
	<meta charset="UTF-8" />
	<title>Tonika Synth Development</title>
	<link rel="stylesheet" href="../css/tonika-tokens.css" />
	<link rel="stylesheet" href="../css/tonika-theme-base.css" />
	<link rel="stylesheet" href="../css/tonika-layout.css" />
	<link rel="stylesheet" href="../css/tonika-components.css" />
	<link rel="stylesheet" href="../css/tonika-accessibility.css" />
	<link rel="stylesheet" href="../css/tonika-synth-development.css" />
</head>
<body>
<!-- Unified Dev Header -->
<div class="dev-header" role="toolbar" aria-label="Developer tools">
	<select id="textureSelect" aria-label="Background texture">
		<option value="">Default</option>
		<option value="../assets/textures/beige-paper.png">Beige Paper</option>
		<option value="../assets/textures/dotnoise-light-grey.png">Dot Noise</option>
		<option value="../assets/textures/noise.webp">Noise</option>
	</select>

	<input type="color" id="bgColorPicker" value="#2c2c2c" aria-label="Bleed tint color" />

	<select id="textureMode" aria-label="Texture mode">
		<option value="tile">Tile</option>
		<option value="stretch">Stretch</option>
	</select>

	<select id="textureScale" aria-label="Texture scale">
		<option value="100">100px</option>
		<option value="200" selected>200px</option>
		<option value="400">400px</option>
	</select>

	<button id="devToggleDebug" type="button">Toggle Debug</button>
	<button id="devResetStyles" type="button">Reset Styles</button>

	<select id="themeSelect" class="tonika-select" style="max-width:180px" aria-label="Theme preset">
		<option>Brown 01</option>
		<option>Brown 02</option>
		<option>Glacier Pulse</option>
	</select>
	<button class="tonika-btn" id="devLightDark" type="button">Light/Dark</button>

	<label for="highContrastToggle">
		<input type="checkbox" id="highContrastToggle" class="tonika-checkbox" />
		<span class="tonika-label">High Contrast</span>
	</label>

	<label for="layoutSelect">Layout:</label>
	<select id="layoutSelect">
		<option value="1x1">1 x 1 (single full tab)</option>
		<option value="1x2">1 x 2 (split horizontally)</option>
		<option value="2x2">2 x 2 (four quadrants)</option>
	</select>
</div>

<!-- Tonika-style tab shell -->
<div class="tonika-container">
	<div class="tabs">
		<button class="active" onclick="openTab(event, 'userSynth')">
			User Synth Module
		</button>
		<button onclick="openTab(event, 'other')">Load Files</button>
	</div>

	<div class="tab-content">
		<!-- User Synth Module Tab -->
		<section id="userSynth" class="active">
			<div class="tonika-module" id="userSynthContainer">
				<p style="opacity: 0.6">
					Load a synth module via the "Load Files" tab.
				</p>
			</div>
		</section>

		<!-- Load Files Tab -->
		<section id="other">
			<h3>Load Synth Module</h3>
			<div class="tonika__file-loader">
				<label>
					Load Synth (HTML):
					<input type="file" id="htmlLoader" accept=".html" />
				</label>
				<label>
					Load Synth (CSS):
					<input type="file" id="cssLoader" accept=".css" />
				</label>
			</div>
		</section>
	</div>
</div>

<!-- Dev Layout Sandbox -->
<div class="tonika__development-layout-sandbox">
	<div
			id="tabPreview"
			class="tonika__development-tab-preview tonika__development-tab-preview--1x1"
	>
		<div
				class="tonika__development-tab-preview-cell"
				id="previewCell"
		></div>
	</div>
</div>

<script src="../js/core/tonika-utils.js"></script>
<script src="../js/core/tonika-theme.js"></script>
<script src="../js/core/tonika-ui.js"></script>
<script>
	/* Handle layout switching */
	function updateLayout(layout) {
		const preview = document.getElementById("tabPreview");
		preview.className =
				"tonika__development-tab-preview tonika__development-tab-preview--" +
				layout;
	}

	/* Handle tab switching */
	function openTab(event, tabId) {
		document
				.querySelectorAll(".tab-content section")
				.forEach((sec) => sec.classList.remove("active"));
		document
				.querySelectorAll(".tabs button")
				.forEach((btn) => btn.classList.remove("active"));
		document.getElementById(tabId).classList.add("active");
		event.currentTarget.classList.add("active");
	}

	/* --- File loading & CSS scoping --- */
	const htmlInput = document.getElementById("htmlLoader");
	const cssInput = document.getElementById("cssLoader");
	const synthHost = document.getElementById("userSynthContainer");
	const previewHost = document.getElementById("previewCell");

	// Store the current synth configuration
	let currentSynthConfig = null;

	// Load & inject user HTML into both main host and preview
	htmlInput.addEventListener("change", function (e) {
		const file = e.target.files[0];
		if (!file) return;

		const reader = new FileReader();
		reader.onload = function (ev) {
			const html = ev.target.result;
			synthHost.innerHTML = html;
			previewHost.innerHTML = html;

			// Try to extract configuration from the loaded HTML
			currentSynthConfig = extractSynthConfig(synthHost);
		};
		reader.readAsText(file);
	});

	// Load CSS, scope it to BOTH containers (main + preview)
	cssInput.addEventListener("change", function (e) {
		const file = e.target.files[0];
		if (!file) return;

		const reader = new FileReader();
		reader.onload = function (ev) {
			const rawCss = ev.target.result;
			const containers = ["#userSynthContainer", "#previewCell"];

			// Prefix selectors; skip top-level @ rules
			const scopedCss = rawCss.replace(
					/(^|})\s*([^@][^{]+)\{/g,
					(m, brace, selectorChunk) => {
						const expanded = selectorChunk
								.split(",")
								.map((sel) => sel.trim())
								.filter(Boolean)
								.map((sel) => containers.map((c) => `${c} ${sel}`).join(", "))
								.join(", ");
						return `${brace} ${expanded}{`;
					},
			);

			let styleTag = document.getElementById("userSynthScopedStyles");
			if (!styleTag) {
				styleTag = document.createElement("style");
				styleTag.id = "userSynthScopedStyles";
				document.head.appendChild(styleTag);
			}
			styleTag.textContent = scopedCss;
		};
		reader.readAsText(file);
	});

	/* Extract configuration from loaded synth HTML */
	function extractSynthConfig(container) {
		// Look for data-tonika-config attribute on the root element
		const rootElement = container.firstElementChild;
		if (rootElement && rootElement.dataset.tonikaConfig) {
			try {
				return JSON.parse(rootElement.dataset.tonikaConfig);
			} catch (e) {
				console.warn("Invalid tonika-config JSON:", e);
			}
		}

		// Fallback: return null (no configuration found)
		return null;
	}

	/* --- Dev header wiring: align with Tonika.Utils API --- */
	const btnDebug = document.getElementById("devToggleDebug");
	const btnReset = document.getElementById("devResetStyles");
	const btnLightDark = document.getElementById("devLightDark");
	const themeSelect = document.getElementById("themeSelect");
	const hcToggle = document.getElementById("highContrastToggle");
	const bgColorPicker = document.getElementById("bgColorPicker");
	const textureSelect = document.getElementById("textureSelect");
	const textureMode = document.getElementById("textureMode");
	const textureScale = document.getElementById("textureScale");

	// Toggle debug grid/outlines on the synth host
	btnDebug.addEventListener("click", () => {
		if (window.Tonika?.Utils?.toggleDebug) {
			Tonika.Utils.toggleDebug(synthHost);
		}
	});

	// Reset module styles to clean dev state
	btnReset.addEventListener("click", () => {
		if (window.Tonika?.Utils?.resetModuleStyles) {
			// Find the loaded synth element inside the container
			const loadedSynth = synthHost.firstElementChild;
			const target = loadedSynth && loadedSynth.tagName !== 'P' ? loadedSynth : synthHost;

			Tonika.Utils.resetModuleStyles(target, {
				config: currentSynthConfig,
				bgColorPicker,
				textureSelect,
				textureMode,
				textureScale,
			});
		}
	});

	// Background tint / bleed
	bgColorPicker.addEventListener("input", (e) => {
		if (window.Tonika?.Utils?.applyBleedTint && currentSynthConfig) {
			// Find the loaded synth element inside the container
			const loadedSynth = synthHost.firstElementChild;
			const target = loadedSynth && loadedSynth.tagName !== 'P' ? loadedSynth : synthHost;

			Tonika.Utils.applyBleedTint(
					target,
					e.target.value,
					currentSynthConfig,
			);
		}
	});

	// Texture selection
	[textureSelect, textureMode, textureScale].forEach((el) =>
			el.addEventListener("change", () => {
				if (window.Tonika?.Utils?.applyTexture) {
					// Find the loaded synth element inside the container
					const loadedSynth = synthHost.firstElementChild;
					const target = loadedSynth && loadedSynth.tagName !== 'P' ? loadedSynth : synthHost;

					Tonika.Utils.applyTexture(
							target,
							textureSelect.value,
							textureMode.value,
							textureScale.value,
					);
				}
			}),
	);

	// Theme preset select
	themeSelect.addEventListener("change", (e) => {
		if (window.Tonika?.Theme?.setTheme) {
			Tonika.Theme.setTheme(e.target.value);
		} else {
			// Fallback: set data-theme on <html>
			document.documentElement.setAttribute(
					"data-theme",
					e.target.value.toLowerCase().replace(/\s+/g, "-"),
			);
		}
	});

	// Light/Dark toggle
	btnLightDark.addEventListener("click", () => {
		if (window.Tonika?.Theme?.toggleLightDark) {
			Tonika.Theme.toggleLightDark();
		} else {
			const root = document.documentElement;
			root.dataset.mode = root.dataset.mode === "dark" ? "light" : "dark";
		}
	});

	// High Contrast toggle
	hcToggle.addEventListener("change", (e) => {
		if (window.Tonika?.Theme?.toggleHighContrast) {
			Tonika.Theme.toggleHighContrast(e.target.checked);
		} else {
			// Apply to body element instead of documentElement
			document.body.classList.toggle(
					"tonika--high-contrast",
					e.target.checked,
			);
		}
	});

	// Layout selection
	const layoutSelect = document.getElementById("layoutSelect");
	layoutSelect.addEventListener("change", (e) =>
			updateLayout(e.target.value),
	);
</script>
</body>
</html>
