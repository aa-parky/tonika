<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Tonika - Curated</title>
    <link href="css/tonika-theme-base.css" rel="stylesheet" />
    <link href="css/tonika-layout.css" rel="stylesheet" />
    <link href="css/tonika-components.css" rel="stylesheet" />
    <link href="css/tonika-tokens.css" rel="stylesheet" />
    <link href="css/clavonika.css" rel="stylesheet" />
    <link href="css/chordonika.css" rel="stylesheet" />

    <script src="js/core/tonika-ui.js"></script>
    <script src="js/core/tonika-theme.js"></script>
    <script src="js/core/tonika-emitter.js"></script>
    <script src="js/core/soundonika.js"></script>
    <script src="js/core/jackonika.js"></script>
    <script src="js/core/clavonika.js"></script>
    <script src="js/core/chordonika.js"></script>
</head>
<body>
<header>
    <h1>Tonika - Curated</h1>
</header>
<main class="tonika-container">
    <div class="tabs">
        <button class="active" onclick="Tonika.UI.openTab(0)">1</button>
        <button onclick="Tonika.UI.openTab(1)">Chordonika</button>
        <button onclick="Tonika.UI.openTab(2)">3</button>
        <button onclick="Tonika.UI.openTab(3)">Chordify</button>
        <button onclick="Tonika.UI.openTab(4)">Settings</button>
    </div>
    <div class="tab-content">
        <section class="active">
            <div class="tonika-module">Tab 1 Content</div>
        </section>

        <!-- Chordonika tab -->
        <section>
            <div class="tonika-grid-2">
                <div id="chord-selector"></div>
                <div class="tonika-module" id="chord-events">
                    <h3>Chord Events</h3>
                    <button class="tonika-btn tonika-btn--danger tonika-mb-sm" id="clear-event-log">Clear Log</button>
                    <ul id="chord-event-log" class="tonika-list"></ul>
                </div>
            </div>
        </section>

        <section>
            <div class="tonika-module">Tab 3 Content</div>
        </section>
        <section>
            <div class="tonika-module">
                <iframe frameborder="0" height="400" src="https://chordify.net/embed/mark-knopfler-songs/once-upon-a-time-storybook-love-chords" width="100%"></iframe>
            </div>
        </section>
        <section>
            <div class="tonika-grid-2">
                <div class="tonika-module">
                    <h3>Settings UI</h3>

                    <p>Select Theme:</p>
                    <select class="tonika-select tonika-max-220" id="theme-selector"></select>

                    <p class="tonika-mt-lg">Toggle Light/Dark:</p>
                    <button class="tonika-btn tonika-btn--primary" onclick="TonikaTheme.toggleMode()">Toggle Mode</button>
                </div>

                <div class="tonika-module">
                    <h4>Modules</h4>
                    <p>Cards automatically adapt to the current theme.</p>
                    <button class="tonika-btn">Another Action</button>
                </div>
            </div>
        </section>
    </div>

    <div class="roll88">
        <div class="piano-placeholder" id="piano">
            <script type="module">
                const piano = Tonika.Clavonika.init("piano");
                piano.on("ui:noteon", (e) => console.log("UI note on", e.detail));
                piano.on("ui:noteoff", (e) => console.log("UI note off", e.detail));
            </script>
        </div>
    </div>
</main>
<footer>
    <p>
        MIT License © 2025
        <a href="https://github.com/aa-parky/tonika/tree/main" title="aa-parky">aa-parky</a>
    </p>
</footer>

<script>
    // ===================================================================
    // MODULE INITIALIZATION
    // ===================================================================

    // Chordonika (Chord selector + visualizer)
    const chordModule = new Chordonika({
        mount: "#chord-selector",
        mode: "card",
        onChordSelected: (chord) => {
            console.log("Selected chord (callback):", chord);
        },
    });

    // Listen for new unified event
    chordModule.on("ui:chordselected", (e) => {
        const chord = e.detail;
        const log = document.getElementById("chord-event-log");
        const li = document.createElement("li");
        li.textContent = chord ? `${chord.symbol}: ${chord.notes.join(" - ")}` : "Cleared";
        log.prepend(li);
    });

    // Clear log button
    document.getElementById("clear-event-log").addEventListener("click", () => {
        const log = document.getElementById("chord-event-log");
        log.innerHTML = "";
    });
</script>
</body>
</html>
