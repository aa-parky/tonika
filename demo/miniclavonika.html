<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<title>MiniClavonika Demo</title>
	<style>
		body { font-family: sans-serif; padding: 1em; }
		.miniclavonika__key rect { cursor: pointer; }
		.miniclavonika__key--white rect { fill: #fff; stroke: #aaa; }
		.miniclavonika__key--black rect { fill: #111; stroke: #000; }
		.miniclavonika__active rect { fill: orange !important; }
		.miniclavonika__label { font-size: 8px; pointer-events: none; user-select: none; }
		.miniclavonika__container { width: 600px; height: 150px; border: 1px solid #ccc; }
	</style>
</head>
<body>
<h1>MiniClavonika (2 Octaves)</h1>
<div id="mini-container" class="miniclavonika__container"></div>

<script src="../js/core/miniclavonika.js"></script>
<script>
	const mini = Tonika.MiniClavonika.init("mini-container");
	mini.on("ui:noteon", e => console.log("Note On:", e.detail));
	mini.on("ui:noteoff", e => console.log("Note Off:", e.detail));
</script>
</body>
</html>
