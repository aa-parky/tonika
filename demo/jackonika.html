<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Jackonika – Tonika Core Demo</title>
    <link rel="stylesheet" href="../css/tonika-core.css">
    <link rel="stylesheet" href="../css/tonika-components.css">
</head>
<body class="tonika theme--dark">
<main class="tonika-page">
    <h1 class="tonika-h1">Jackonika</h1>
    <label class="tonika-label">MIDI Input</label>
    <select id="midiDeviceSelector" class="tonika-select"></select>
    <div id="log" class="tonika-card"
         style="margin-top:1rem; padding:1rem; max-height:300px; overflow-y:auto;"></div>
</main>

<script src="../js/jackonika.js"></script>
<script>
    const log = (m) => {
        const el = document.getElementById('log');
        el.innerText = (m + "\n" + el.innerText).slice(0, 4000);
    };

    Tonika.Jackonika.init({
        selectorId: "midiDeviceSelector",
        onStatus: (type, msg) => log(`[${type}] ${msg}`),
        onNoteOn: (note, vel) => log(`NOTE ON  ${note} vel=${vel}`),
        onNoteOff: (note) => log(`NOTE OFF ${note}`)
    });
</script>
</body>
</html>
