<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clavonika - Modernized with ES Modules</title>
    <link rel="stylesheet" href="../css/clavonika.css">
    <script src="../js/core/clavonika.js"></script>
</head>
<body>

<h1>Clavonika</h1>

<div class="roll88">
    <div class="piano-placeholder" id="piano">
        <script type="module">
            const piano = Tonika.Clavonika.init('piano');
            piano.on('ui:noteon', e => console.log('UI note on', e.detail));
            piano.on('ui:noteoff', e => console.log('UI note off', e.detail));
        </script>
    </div>
</div>



</body>
</html>
