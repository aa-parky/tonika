<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Jackonika Test</title>
	<style>
		/* keep your minimal "fixed header + scroll log" layout */
		body { margin:0; padding:0; font-family: Arial, sans-serif; height:100vh; display:flex; flex-direction:column; }
		.header { background:#f5f5f5; padding:20px; border-bottom:2px solid #ddd; flex-shrink:0; }
		.header h1 { margin:0 0 10px 0; }
		.row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
		#log { flex:1; overflow-y:auto; padding:20px; background:#fff; }
		#log div { margin-bottom:5px; padding:5px; background:#f9f9f9; border-left:3px solid #007acc; font-family: monospace; }
		.hidden { display:none; }
		select[multiple] { min-width: 360px; min-height: 86px; }
	</style>
</head>
<body>
<div class="header">
	<h1>Jackonika Test Page</h1>

	<div class="row">
		<strong>Mode:</strong>
		<label><input type="radio" name="mode" value="all" checked> All devices</label>
		<label><input type="radio" name="mode" value="select"> Select device(s)</label>
	</div>

	<div class="row" id="deviceRow" class="hidden">
		<label for="midiDeviceSelector"><strong>Devices:</strong></label>
		<select id="midiDeviceSelector" multiple></select>
	</div>

	<div class="row">
		<button id="clear">Clear Log</button>
		<button id="dumpStatus">Dump Jackonika Status to Log</button>
	</div>

	<h2>Event Log</h2>
</div>

<div id="log"></div>

<script src="../js/core/tonika-bus.js"></script>
<script src="../js/core/jackonika.js"></script>
<script>
	document.addEventListener("DOMContentLoaded", () => {
		// Init Jackonika in "all" mode by default
		const jack = new Tonika.Jackonika({
			moduleInfo: { name: "Jackonika", version: "2.2.0" },
			selectorId: "midiDeviceSelector",
			mode: "all"
		});

		const logDiv = document.getElementById("log");
		const clearBtn = document.getElementById("clear");
		const dumpBtn = document.getElementById("dumpStatus");
		const deviceRow = document.getElementById("deviceRow");
		const selector = document.getElementById("midiDeviceSelector");

		function logEvent(type, detail) {
			const el = document.createElement("div");
			el.textContent = `[${new Date().toLocaleTimeString()}] ${type} → ${JSON.stringify(detail)}`;
			logDiv.prepend(el);
		}

		// Subscribe to all known events
		Tonika.Bus.on("midi:noteon", e => logEvent("midi:noteon", e.detail));
		Tonika.Bus.on("midi:noteoff", e => logEvent("midi:noteoff", e.detail));
		Tonika.Bus.on("midi:aftertouch", e => logEvent("midi:aftertouch", e.detail));
		Tonika.Bus.on("midi:cc", e => logEvent("midi:cc", e.detail));
		Tonika.Bus.on("midi:programchange", e => logEvent("midi:programchange", e.detail));
		Tonika.Bus.on("midi:channelpressure", e => logEvent("midi:channelpressure", e.detail));
		Tonika.Bus.on("midi:pitchbend", e => logEvent("midi:pitchbend", e.detail));
		Tonika.Bus.on("midi:devicechange", e => logEvent("midi:devicechange", e.detail));
		Tonika.Bus.on("midi:unknown", e => logEvent("midi:unknown", e.detail));
		Tonika.Bus.on("app:status", e => logEvent("app:status", e.detail));

		// Mode toggles
		document.querySelectorAll('input[name="mode"]').forEach(r => {
			r.addEventListener("change", () => {
				const mode = document.querySelector('input[name="mode"]:checked').value;
				jack.setMode(mode);
				// Show/hide multi-select row
				if (mode === "select") {
					deviceRow.classList.remove("hidden");
				} else {
					deviceRow.classList.add("hidden");
				}
			});
		});

		// Multi-select device changes
		selector.addEventListener("change", () => {
			const ids = Array.from(selector.selectedOptions).map(o => o.value);
			jack.setSelectedDevices(ids);
		});

		// Utilities
		clearBtn.addEventListener("click", () => logDiv.innerHTML = "");
		dumpBtn.addEventListener("click", () => logEvent("getStatus()", jack.getStatus()));
	});
</script>
</body>
</html>
