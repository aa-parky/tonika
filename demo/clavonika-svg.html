<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clavonika SVG - Piano Keyboard Interface</title>

    <link href="../css/clavonika-svg.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Great+Vibes&family=Noto+Sans+Mono:wght@100..900&family=Sacramento&display=swap" rel="stylesheet">

  </head>
  <body>
    <!-- Clavonika Container -->
    <div id="piano-container"></div>

    <!-- Demo Controls -->
    <div class="demo-controls">
      <h3>Demo Controls</h3>
      <button onclick="playNote(60, 0.8)">Play Middle C</button>
      <button onclick="playChord([60, 64, 67], 0.6)">Play C Major</button>
      <button onclick="playScale()">Play C Scale</button>
      <button onclick="clearAllNotes()">Clear All</button>
    </div>

    <!-- Status Display -->
    <div class="status-display" id="status"></div>

    <!-- SVG Gradients Definition -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <!-- White Key Gradients -->
        <linearGradient id="whiteKeyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color: #fff; stop-opacity: 1" />
          <stop offset="50%" style="stop-color: #f8f8f8; stop-opacity: 1" />
          <stop offset="100%" style="stop-color: #f0f0f0; stop-opacity: 1" />
        </linearGradient>

        <linearGradient
          id="whiteKeyHoverGradient"
          x1="0%"
          y1="0%"
          x2="0%"
          y2="100%"
        >
          <stop offset="0%" style="stop-color: #f5f5f5; stop-opacity: 1" />
          <stop offset="50%" style="stop-color: #eee; stop-opacity: 1" />
          <stop offset="100%" style="stop-color: #e8e8e8; stop-opacity: 1" />
        </linearGradient>

        <!-- Black Key Gradients -->
        <linearGradient id="blackKeyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color: #2a2a2a; stop-opacity: 1" />
          <stop offset="50%" style="stop-color: #1a1a1a; stop-opacity: 1" />
          <stop offset="100%" style="stop-color: #000; stop-opacity: 1" />
        </linearGradient>

        <linearGradient
          id="blackKeyHoverGradient"
          x1="0%"
          y1="0%"
          x2="0%"
          y2="100%"
        >
          <stop offset="0%" style="stop-color: #404040; stop-opacity: 1" />
          <stop offset="50%" style="stop-color: #2a2a2a; stop-opacity: 1" />
          <stop offset="100%" style="stop-color: #1a1a1a; stop-opacity: 1" />
        </linearGradient>
      </defs>
    </svg>

    <!-- Load Clavonika SVG -->
    <script src="../js/core/clavonika-svg.js"></script>

    <script>
      // Initialize Clavonika
      let piano;
      let statusEl;

      function log(message) {
        if (statusEl) {
          statusEl.innerHTML +=
            new Date().toLocaleTimeString() + ": " + message + "\n";
          statusEl.scrollTop = statusEl.scrollHeight;
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        statusEl = document.getElementById("status");

        try {
          // Initialize the piano
          piano = window.Tonika.Clavonika.init("piano-container");

          // Set up event listeners
          piano.on("ui:noteon", function (event) {
            log(
              `Note ON: MIDI ${event.detail.midi}, velocity ${event.detail.velocity}`,
            );
          });

          piano.on("ui:noteoff", function (event) {
            log(`Note OFF: MIDI ${event.detail.midi}`);
          });

          piano.on("app:status", function (event) {
            log(`Status [${event.detail.level}]: ${event.detail.msg}`);
          });

          log("Clavonika SVG initialized successfully!");
          log("Connect a MIDI device or use the demo controls below.");
        } catch (error) {
          log("Error initializing Clavonika: " + error.message);
        }
      });

      // Demo functions
      function playNote(midiNote, velocity = 0.8) {
        if (piano) {
          piano.noteOn(midiNote, velocity);
          setTimeout(() => piano.noteOff(midiNote), 500);
        }
      }

      function playChord(notes, velocity = 0.6) {
        if (piano) {
          notes.forEach((note) => piano.noteOn(note, velocity));
          setTimeout(() => {
            notes.forEach((note) => piano.noteOff(note));
          }, 1000);
        }
      }

      function playScale() {
        if (piano) {
          const scale = [60, 62, 64, 65, 67, 69, 71, 72]; // C major scale
          let delay = 0;

          scale.forEach((note, index) => {
            setTimeout(() => {
              piano.noteOn(note, 0.7);
              setTimeout(() => piano.noteOff(note), 300);
            }, delay);
            delay += 200;
          });
        }
      }

      function clearAllNotes() {
          if (piano) {
              for (let i = 21; i <= 108; i++) {
                  piano.noteOff(i);
              }
          }
          // Wipe the status display completely
          if (statusEl) {
              statusEl.innerHTML = "";
          }
      }
    </script>
  </body>
</html>
